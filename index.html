<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Temperatura</title>
</head>
<body>
<main class="conversor-container">
        <h1>Conversor de Temperatura</h1>
        
        <div class="input-grupo">
            <label for="valor-temperatura">Digite a temperatura:</label>
            <input type="number" id="valor-temperatura" placeholder="Ex: 25">
        </div>
        <div class="seletores-grupo">
            <div class="campo">
                <label for="unidade-de">De:</label>
                <select id="unidade-de">
                    <option value="C">Celsius (°C)</option>
                    <option value="F">Fahrenheit (°F)</option>
                    <option value="K">Kelvin (K)</option>
                </select>
            </div>

            <div class="campo">
                <label for="unidade-para">Para:</label>
                <select id="unidade-para">
                    <option value="F">Fahrenheit (°F)</option>
                    <option value="C">Celsius (°C)</option>
                    <option value="K">Kelvin (K)</option>
                </select>
            </div>
        </div>
        <button id="botao-converter">Converter</button>

        <div id="resultado-container">
            <p id="resultado-texto">O resultado aparecerá aqui...</p>
        </div>
    </main>
</body>
</html>
