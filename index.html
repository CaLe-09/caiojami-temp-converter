<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Temperatura</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="conversor-container">

        <header class="cabecalho">
            <h1>🌡️ Conversor de Temperatura</h1>
            <p>
                Converta temperaturas entre Celsius, Fahrenheit e Kelvin de forma rápida e precisa.
            </p>
        </header>

        <section class="entrada">

            <div class="input-grupo">
                <label for="valor-temperatura">
                    Temperatura
                </label>

                <input
                    type="number"
                    id="valor-temperatura"
                    placeholder="Digite um valor">
            </div>

        </section>

        <section class="seletores-grupo">

            <div class="campo">

                <label for="unidade-de">
                    Converter de
                </label>

                <select id="unidade-de">
                    <option value="C">Celsius (°C)</option>
                    <option value="F">Fahrenheit (°F)</option>
                    <option value="K">Kelvin (K)</option>
                </select>

            </div>

            <div class="campo">

                <label for="unidade-para">
                    Converter para
                </label>

                <select id="unidade-para">
                    <option value="F">Fahrenheit (°F)</option>
                    <option value="C">Celsius (°C)</option>
                    <option value="K">Kelvin (K)</option>
                </select>

            </div>

        </section>

        <section class="acoes">

            <button id="botao-converter">
                Converter
            </button>

            <button id="botao-limpar" type="button">
                Limpar
            </button>

        </section>

        <section class="resultado-container">

            <h2>Resultado</h2>

            <p id="resultado-texto">
                O resultado aparecerá aqui.
            </p>

            <small id="mensagem-erro"></small>

        </section>

    </main>

    <script src="js/script.js"></script>

</body>

</html>
